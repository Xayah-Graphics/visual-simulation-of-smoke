name: Linux Build (Arch)

on:
  workflow_dispatch:
  push:
    paths:
      - '**'
  pull_request:
    paths:
      - '**'

concurrency:
  group: linux-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  arch-build-and-benchmark:
    name: Build (Arch Linux, CMake+Ninja)
    runs-on: ubuntu-latest

    container:
      image: archlinux:latest

    env:
      CMAKE_BUILD_TYPE: Release
      CUDAToolkit_ROOT: /opt/cuda

    steps:
      - name: Prepare Arch keyring + update system
        shell: bash
        run: |
          set -euxo pipefail
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm

      - name: Install build dependencies
        shell: bash
        run: |
          set -euxo pipefail
          pacman -S --noconfirm --needed \
            base-devel git \
            cmake ninja pkgconf \
            gcc \
            ca-certificates curl tar unzip \
            python \
            cuda
          pacman -Scc --noconfirm || true

          echo "/opt/cuda/bin" >> "$GITHUB_PATH"
          echo "CUDAToolkit_ROOT=/opt/cuda" >> "$GITHUB_ENV"

      - name: Toolchain sanity
        shell: bash
        run: |
          set -euxo pipefail
          g++ --version
          cmake --version
          ninja --version
          command -v nvcc
          nvcc --version

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        shell: bash
        run: |
          set -euxo pipefail
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE="${CMAKE_BUILD_TYPE}"

      - name: Build
        shell: bash
        run: |
          set -euxo pipefail
          cmake --build build --target visual-simulation-of-smoke-app --parallel


